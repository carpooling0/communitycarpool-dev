<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Community Carpool</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✉️</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            padding: 40px;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .logo-img {
            display: block;
            max-width: 250px;
            width: 100%;
            height: auto;
            margin: 0 auto 10px auto;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            color: #1a365d;
            font-size: 28px;
            font-weight: 700;
        }

        .form-group { margin-bottom: 22px; }

        label {
            display: block;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .required { color: #ef4444; }

        input[type="email"],
        input[type="text"],
        textarea,
        select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
            color: #1e293b;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #10b981;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 110px;
        }

        /* Radio cards */
        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 4px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 13px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            cursor: pointer;
            transition: border-color 0.2s ease, background 0.2s ease;
            user-select: none;
        }

        .radio-option:hover { border-color: #10b981; background: #f0fdf4; }

        .radio-option input[type="radio"] {
            accent-color: #10b981;
            width: 16px;
            height: 16px;
            flex-shrink: 0;
            cursor: pointer;
        }

        .radio-option span {
            font-size: 15px;
            color: #1e293b;
            font-weight: 500;
        }

        .radio-option.selected { border-color: #10b981; background: #f0fdf4; }

        .hidden { display: none; }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
        }

        .submit-btn:hover {
            background: #059669;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2);
        }

        .submit-btn:disabled {
            background: #94a3b8;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .message {
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .message.success { background: #d1fae5; color: #065f46; border: 1px solid #6ee7b7; }
        .message.error   { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
        .message.show    { display: block; animation: slideIn 0.3s ease-out; }

        /* Thank You */
        .thank-you { text-align: center; padding: 40px 20px; }
        .thank-you-icon { font-size: 80px; margin-bottom: 20px; }

        .thank-you h2 {
            color: #1a365d;
            font-size: 28px;
            margin-bottom: 15px;
        }

        .thank-you p {
            color: #64748b;
            font-size: 16px;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .back-btn {
            display: inline-block;
            padding: 14px 30px;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: #059669;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2);
        }

        @media (max-width: 640px) {
            body { padding: 10px; }
            .container { padding: 25px 15px; border-radius: 15px; }
            .logo-img { max-width: 200px; }
            .logo h1 { font-size: 22px; }
            .thank-you-icon { font-size: 60px; }
            .thank-you h2 { font-size: 24px; }
        }
    </style>
</head>

<body>
    <div class="container">
        <img src="logo_with_slogan.png" alt="Community Carpool Logo" class="logo-img">

        <div class="logo">
            <h1>✉️ Contact Us</h1>
        </div>

        <!-- Form Section -->
        <div id="formSection">
            <div id="message" class="message"></div>

            <form id="supportForm">

                <!-- Shared email -->
                <div class="form-group">
                    <label for="email">Your Email <span class="required">*</span></label>
                    <input type="email" id="email" name="email" placeholder="your@email.com">
                </div>

                <!-- Request type — radio cards -->
                <div class="form-group">
                    <label>What is this about? <span class="required">*</span></label>
                    <div class="radio-group">
                        <label class="radio-option" id="optionDeletion">
                            <input type="radio" name="requestType" value="deletion">
                            <span>Data Deletion Request</span>
                        </label>
                        <label class="radio-option" id="optionReportUser">
                            <input type="radio" name="requestType" value="report_user">
                            <span>Report a User</span>
                        </label>
                        <label class="radio-option" id="optionTechnical">
                            <input type="radio" name="requestType" value="technical">
                            <span>Technical / Other Issue</span>
                        </label>
                    </div>
                </div>

                <!-- Report a User only -->
                <div id="reportUserFields" class="hidden">
                    <div class="form-group">
                        <label for="subjectEmail">Email of person you are reporting <span class="required">*</span></label>
                        <input type="email" id="subjectEmail" name="subjectEmail" placeholder="their@email.com">
                    </div>
                    <div class="form-group">
                        <label for="issueDescription">Issue type <span class="required">*</span></label>
                        <select id="issueDescription" name="issueDescription">
                            <option value="">Select issue type...</option>
                            <option value="Spam/Harassment">Spam/Harassment</option>
                            <option value="Fake Profile">Fake Profile</option>
                            <option value="Safety Concern">Safety Concern</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>

                <!-- Shared details -->
                <div class="form-group">
                    <label for="details">Details <span class="required">*</span></label>
                    <textarea id="details" name="details" placeholder="Please provide any details..."></textarea>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">Submit</button>
            </form>
        </div>

        <!-- Thank You Section -->
        <div id="thankYouSection" class="thank-you hidden">
            <div class="thank-you-icon">✅</div>
            <h2>Thank You!</h2>
            <p>Your request has been submitted successfully.<br>We will review it and get back to you if needed.</p>
            <a href="support.html" class="back-btn">Submit Another Request</a>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://tbkjealpnoriwdosvmju.supabase.co/functions/v1/submit-support-ticket';

        const form             = document.getElementById('supportForm');
        const message          = document.getElementById('message');
        const submitBtn        = document.getElementById('submitBtn');
        const formSection      = document.getElementById('formSection');
        const thankYouSection  = document.getElementById('thankYouSection');
        const reportUserFields = document.getElementById('reportUserFields');
        const detailsInput     = document.getElementById('details');

        const detailsPlaceholders = {
            deletion:    'e.g. Delete Journey #5 only, or delete all my journeys...',
            report_user: 'Please explain the issue in detail...',
            technical:   'Please describe what is not working...'
        };

        let userIP = '';

        async function getIPInfo() {
            const apis = [
                { url: 'https://ipwho.is/',                 parse: d => d.ip },
                { url: 'https://api.ipify.org?format=json',  parse: d => d.ip },
                { url: 'https://api.db-ip.com/v2/free/self', parse: d => d.ipAddress }
            ];
            for (const api of apis) {
                try {
                    const res = await fetch(api.url);
                    if (!res.ok) continue;
                    const data = await res.json();
                    const ip = api.parse(data);
                    if (ip) { userIP = ip; return; }
                } catch (e) {}
            }
            userIP = 'unknown';
        }
        getIPInfo();

        // Radio card behaviour
        document.querySelectorAll('input[name="requestType"]').forEach(radio => {
            radio.addEventListener('change', function () {
                document.querySelectorAll('.radio-option').forEach(opt => opt.classList.remove('selected'));
                this.closest('.radio-option').classList.add('selected');
                clearValidation();

                reportUserFields.classList.toggle('hidden', this.value !== 'report_user');
                detailsInput.placeholder = detailsPlaceholders[this.value] || 'Please provide any details...';
            });
        });

        // Form submission
        form.addEventListener('submit', async function (e) {
            e.preventDefault();
            if (!validateForm()) return;

            submitBtn.disabled = true;
            submitBtn.textContent = 'Submitting...';

            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());
            data.ip = userIP || 'unknown';

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (result.success) {
                    formSection.classList.add('hidden');
                    thankYouSection.classList.remove('hidden');
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                } else {
                    showMessage('Error: ' + (result.error || 'Something went wrong. Please try again.'), 'error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Submit';
                }
            } catch (error) {
                showMessage('Unable to submit. Please try again later.', 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Submit';
            }
        });

        function validateForm() {
            if (!document.getElementById('email').value) {
                showMessage('Please enter your email address.', 'error');
                return false;
            }

            const type = document.querySelector('input[name="requestType"]:checked');
            if (!type) {
                showMessage('Please select what this is about.', 'error');
                return false;
            }

            if (type.value === 'report_user') {
                if (!document.getElementById('subjectEmail').value) {
                    showMessage('Please enter the email of the person you are reporting.', 'error');
                    return false;
                }
                if (!document.getElementById('issueDescription').value) {
                    showMessage('Please select an issue type.', 'error');
                    return false;
                }
            }

            if (!document.getElementById('details').value) {
                showMessage('Please provide details.', 'error');
                return false;
            }

            return true;
        }

        function clearValidation() { message.classList.remove('show'); }

        function showMessage(text, type) {
            message.textContent = text;
            message.className = 'message ' + type + ' show';
            message.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
    </script>
</body>

</html>
